<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- RF-10: CSP — lock down sources; unsafe-inline required for the inline <style> block -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    script-src 'self';
    connect-src http://localhost:8188 ws://localhost:8188 http://127.0.0.1:8188 ws://127.0.0.1:8188;
    img-src 'self' data:;
    media-src file:;
    object-src 'none';
    base-uri 'none';
  ">
  <title>WAN BOOTH</title>
  <!-- Google Fonts — preconnect + link for initial-paint speed -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <!-- Design token stylesheets (bare filenames — colocated in final app) -->
  <link rel="stylesheet" href="type-tokens.css">
  <link rel="stylesheet" href="color-tokens.css">
  <style>

    /* ═══════════════════════════════════════════════════════════════════════════
     *  GRID_GHOST — WAN BOOTH v2 SPATIAL ARCHITECTURE
     *  Layout geometry only. Colors and type reference var(--ws-*) tokens.
     *  Existing token consumers (nameplate, drop-zone, prompt, seed, log, video)
     *  are preserved and extended — not replaced.
     * ═══════════════════════════════════════════════════════════════════════════ */

    /* ── RESET / BASE ────────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 900px;
      min-height: 100vh;
      overflow-x: hidden;
      background: var(--ws-bg);
      color: var(--ws-fg);
      font-family: var(--ws-font-ui);
    }

    /* ── NAMEPLATE ───────────────────────────────────────────────────── */
    #nameplate {
      padding: 20px 24px 12px;
      border-bottom: 1px solid var(--ws-border);
      background: var(--ws-bg);
    }

    #nameplate h1 {
      font-family: var(--ws-font-display);
      font-size: var(--ws-type-display);
      font-weight: var(--ws-weight-display);
      letter-spacing: var(--ws-tracking-display);
      color: var(--ws-amber);
      text-shadow:
        0 0 8px var(--ws-amber-glow),
        0 0 24px var(--ws-amber-glow),
        0 0 48px color-mix(in oklch, var(--ws-amber-glow) 50%, transparent);
      line-height: 1;
      user-select: none;
    }

    /* ── MAIN PANEL — load-bearing chassis ──────────────────────────── */
    /*
     * The gap between sub-panels is structural mass, not breathing room.
     * 16px default gap. LoRA cards sit as a contiguous section — the gap
     * between Stage 1 and Stage 2 is tightened (4px seam) to read as one
     * equipment block. Achieved by zero bottom margin on stage-1, zero top
     * on stage-2, handled inside .lora-section.
     */
    #main-panel {
      padding: 20px 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── DROP ZONE ───────────────────────────────────────────────────── */
    #drop-zone {
      background: var(--ws-bg-elevated);
      border: 2px dashed var(--ws-border);
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 150ms ease, color 150ms ease, background 150ms ease;
    }

    #drop-label {
      font-family: var(--ws-font-ui);
      font-size: var(--ws-type-label);
      font-weight: var(--ws-weight-label);
      letter-spacing: var(--ws-tracking-ui);
      color: var(--ws-fg-muted);
      pointer-events: none;
      user-select: none;
      transition: color 150ms ease;
    }

    #drop-zone.active {
      border-style: dashed;
      border-color: var(--ws-border-active);
      background: color-mix(in oklch, var(--ws-bg-elevated) 85%, var(--ws-amber));
    }

    #drop-zone.active #drop-label {
      color: var(--ws-amber);
    }

    #drop-zone.loaded {
      border-style: solid;
      border-color: var(--ws-neon);
    }

    #drop-zone.loaded #drop-label {
      color: var(--ws-neon);
    }

    /* ── PROMPT INPUT ────────────────────────────────────────────────── */
    #prompt-input {
      font-family: var(--ws-font-mono);
      font-size: var(--ws-type-body);
      line-height: var(--ws-leading-prompt);
      background: var(--ws-bg-elevated);
      color: var(--ws-fg);
      border: 1px solid var(--ws-border);
      padding: 12px 14px;
      width: 100%;
      min-height: 90px;
      resize: vertical;
      outline: none;
      transition: border-color 150ms ease;
    }

    #prompt-input::placeholder {
      color: var(--ws-fg-muted);
      opacity: 1;
    }

    #prompt-input:focus {
      border-color: var(--ws-border-active);
      outline: none;
    }

    /* ════════════════════════════════════════════════════════════════════
     *  LORA STAGE CARDS — THE EQUIPMENT PANELS
     *
     *  Structure:
     *    .lora-section                     — wrapper, defines the subgrid
     *    .lora-stage                       — one stage card (stage-1 / stage-2)
     *    .lora-stage-header                — full-width clickable label row
     *    .lora-stage-body                  — collapsible drawer
     *    .lora-row                         — one [label | track | value] row
     *
     *  Collapse mechanism: checkbox-and-label hack.
     *    <input type="checkbox" class="lora-toggle" id="stage-N-toggle">
     *    <label for="stage-N-toggle" class="lora-stage-header">
     *    <div class="lora-stage-body">
     *
     *  CSS :has() on .lora-stage checks the sibling checkbox state:
     *    .lora-stage:has(.lora-toggle:checked) .lora-stage-body { max-height ... }
     *
     *  The panel opens when the checkbox is CHECKED (default state).
     *  Clicking the header label toggles the checkbox — pure CSS, zero JS.
     *
     *  SUBGRID: .lora-section establishes a named grid with 3 columns.
     *  Both .lora-stage-body instances inherit this column geometry via
     *  display: subgrid. Label column is fixed at 180px. Value column is
     *  fixed at 52px. Track fills the remainder. This means labels and
     *  value readouts stay column-aligned even when both stages are open.
     *
     *  Electron 28 (Chromium 120) — subgrid: SUPPORTED (Chrome 117+).
     *  No fallback needed for this target.
     * ════════════════════════════════════════════════════════════════════ */

    /* Outer wrapper — establishes the subgrid column template */
    .lora-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .lora-stage {
      border: 1px solid var(--ws-border);
      background: var(--ws-bg-elevated);
    }

    /* Stage-2 card top border merges with stage-1 bottom:
     * The 4px gap is the seam. Both borders remain visible — two panels bolted together.
     * No negative margin tricks — the seam is honest structure. */

    /* ── LORA TOGGLE CHECKBOX — the mechanical latch (hidden) ────────── */
    .lora-toggle {
      /* Visually hidden but accessible to :has() and label targeting */
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* ── STAGE HEADER — the pull-handle ─────────────────────────────── */
    .lora-stage-header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 5px 12px;
      border-bottom: 1px solid var(--ws-border);
      cursor: pointer;
      user-select: none;
      /* Physical click feel: no easing. Immediate response. */
      transition: background 80ms step-end;
    }

    .lora-stage-header:active {
      background: color-mix(in oklch, var(--ws-bg-elevated) 80%, var(--ws-amber));
    }

    .lora-stage-header-title {
      font-family: var(--ws-font-ui);
      font-size: var(--ws-type-label);
      font-weight: var(--ws-weight-label);
      letter-spacing: var(--ws-tracking-ui);
      color: var(--ws-fg-muted);
      text-transform: uppercase;
    }

    .lora-stage-header-caret {
      font-family: var(--ws-font-mono);
      font-size: var(--ws-type-small);
      color: var(--ws-fg-muted);
      opacity: 0.5;
      /* Caret rotates on open — the panel rotates the indicator, not the drawer */
      display: inline-block;
      transition: transform cubic-bezier(0.87, 0, 0.13, 1) 260ms;
    }

    /* ── DRAWER — open when toggle is CHECKED ────────────────────────── */
    /*
     * max-height collapse pattern: the only CSS-only collapse that works
     * with subgrid (overflow:hidden on the parent does not prevent subgrid
     * rows from contributing to the parent grid's row sizing).
     * We clamp to a known maximum height. 200px covers 4 rows @ ~44px each
     * with comfortable padding.
     */
    .lora-stage-body {
      display: grid;
      grid-template-columns: 150px 1fr 52px;
      overflow: hidden;
      max-height: 0;
      transition: max-height cubic-bezier(0.87, 0, 0.13, 1) 320ms;
      padding: 0 12px;
    }

    /* Checked = open panel — drawer extends to full height */
    .lora-stage:has(.lora-toggle:checked) .lora-stage-body {
      max-height: 160px;
      padding: 6px 12px;
    }

    /* Caret indicator: ▸ when closed, ▾ when open */
    .lora-stage:has(.lora-toggle:checked) .lora-stage-header-caret::before {
      content: '▾';
    }
    .lora-stage:not(:has(.lora-toggle:checked)) .lora-stage-header-caret::before {
      content: '▸';
    }

    /* Caret rotates — purely ornamental, the content swap above is the signal */
    .lora-stage:has(.lora-toggle:checked) .lora-stage-header-caret {
      transform: none;
      opacity: 0.8;
    }

    /* ── LORA ROW — [label | track | value] ─────────────────────────── */
    /*
     * Uses subgrid inherited from .lora-stage-body → .lora-section columns.
     * Each row is a full-bleed grid item: 3 cells, always aligned with the
     * outer section grid. Both stages share the same column geometry.
     */
    .lora-row {
      display: contents; /* participates in parent subgrid as individual cells */
    }

    .lora-row-label {
      grid-column: 1;
      display: flex;
      align-items: center;
      padding: 4px 0;
      font-family: var(--ws-font-ui);
      font-size: var(--ws-type-small);
      font-weight: var(--ws-weight-label);
      letter-spacing: var(--ws-tracking-ui);
      color: var(--ws-fg-muted);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .lora-row-track {
      grid-column: 2;
      display: flex;
      align-items: center;
      padding: 4px 8px 4px 0;
    }

    .lora-row-value {
      grid-column: 3;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 4px 0;
      font-family: var(--ws-font-mono);
      font-size: var(--ws-type-small);
      color: var(--ws-fg-muted);
      white-space: nowrap;
    }

    /* ── RANGE INPUT — styled as an industrial track ─────────────────── */
    /*
     * Browser default range inputs are cartoonish. We strip everything
     * and rebuild: thin track (3px), small thumb (10×16px — finger-width
     * rectangle, not a ball), no border-radius on the track.
     * The thumb is a hard-edged marker, not a bubble.
     */
    .lora-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      background: var(--ws-border);
      outline: none;
      cursor: pointer;
    }

    /* Webkit track (Electron/Chromium) */
    .lora-slider::-webkit-slider-runnable-track {
      height: 3px;
      background: var(--ws-border);
    }

    /* Webkit thumb — hard-edged rectangular marker */
    .lora-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 3px;
      height: 16px;
      background: var(--ws-amber);
      border: none;
      border-radius: 0;
      margin-top: -6.5px; /* center thumb on track */
      cursor: pointer;
      transition: background 100ms ease;
    }

    .lora-slider:hover::-webkit-slider-thumb {
      background: color-mix(in oklch, var(--ws-amber) 85%, white);
    }

    .lora-slider:focus::-webkit-slider-thumb {
      outline: 1px solid var(--ws-border-active);
      outline-offset: 2px;
    }

    /* ── SEED ROW ────────────────────────────────────────────────────── */
    #seed-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #seed-label {
      font-family: var(--ws-font-ui);
      font-size: var(--ws-type-small);
      font-weight: var(--ws-weight-label);
      letter-spacing: var(--ws-tracking-ui);
      color: var(--ws-fg-muted);
      user-select: none;
    }

    #seed-toggle {
      font-family: var(--ws-font-ui);
      font-size: var(--ws-type-label);
      font-weight: var(--ws-weight-label);
      letter-spacing: var(--ws-tracking-ui);
      background: transparent;
      border: 1px solid var(--ws-border);
      border-radius: 0;
      color: var(--ws-fg-muted);
      cursor: pointer;
      padding: 4px 10px;
      transition: border-color 150ms ease, color 150ms ease;
    }

    #seed-toggle:hover {
      border-color: var(--ws-border-active);
      color: var(--ws-amber);
    }

    #seed-value {
      display: none;
      font-family: var(--ws-font-mono);
      font-size: var(--ws-type-small);
      background: var(--ws-bg-elevated);
      color: var(--ws-fg);
      border: 1px solid var(--ws-border);
      border-radius: 0;
      padding: 4px 8px;
      width: 140px;
      outline: none;
      transition: border-color 150ms ease;
    }

    #seed-value:focus {
      border-color: var(--ws-border-active);
      outline: none;
    }

    #seed-value::-webkit-outer-spin-button,
    #seed-value::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    /* ── GENERATE BUTTON ─────────────────────────────────────────────── */
    #go-btn {
      width: 100%;
      padding: 14px 0;
      background: var(--ws-amber);
      color: var(--ws-bg);
      font-family: var(--ws-font-ui);
      font-size: var(--ws-type-label);
      font-weight: var(--ws-weight-label);
      letter-spacing: var(--ws-tracking-ui);
      border: none;
      border-radius: 0;
      cursor: pointer;
      transition: opacity 150ms ease, background 150ms ease;
      user-select: none;
    }

    #go-btn:hover:not(:disabled) {
      background: color-mix(in oklch, var(--ws-amber) 90%, white);
    }

    #go-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ════════════════════════════════════════════════════════════════════
     *  PROGRESS BAR — upgraded from 6px to 11px with shimmer overlay
     *
     *  Structure:
     *    #progress-bar          — track container (11px, hard edge)
     *    #progress-fill         — fill layer (state-colored, JS-driven width)
     *    #progress-shimmer      — shimmer overlay (CSS-only, moving gradient)
     *
     *  Shimmer: a 40%-wide semi-transparent highlight moves left→right
     *  on a 1.8s linear loop. Pure CSS @keyframes + background-position.
     *  The shimmer is a child of #progress-bar positioned absolutely over
     *  the fill. It is clipped by overflow:hidden on the parent.
     *  When fill is 0% width, the shimmer has nothing to sit on — it
     *  will slide over the dark track silently. Fine.
     * ════════════════════════════════════════════════════════════════════ */
    #progress-bar {
      position: relative;
      background: var(--ws-bg-elevated);
      border: 1px solid var(--ws-border);
      height: 11px;
      width: 100%;
      overflow: hidden;
    }

    #progress-fill {
      background: var(--ws-state-idle);
      height: 100%;
      width: 0%;
      transition: width 300ms ease, background 200ms ease;
      position: relative;
      z-index: 1;
    }

    /* Shimmer overlay — sits above fill, clipped by parent overflow:hidden */
    #progress-shimmer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      background: linear-gradient(
        90deg,
        transparent 0%,
        transparent 30%,
        color-mix(in oklch, white 22%, transparent) 50%,
        transparent 70%,
        transparent 100%
      );
      background-size: 250% 100%;
      animation: shimmer-sweep 1.8s linear infinite;
    }

    @keyframes shimmer-sweep {
      0%   { background-position: 200% center; }
      100% { background-position: -50% center; }
    }

    /* ════════════════════════════════════════════════════════════════════
     *  ETA / ELAPSED ROW
     *
     *  Hidden by default. Shown only when #main-panel has data-generating.
     *  JS sets this attribute on startGeneration() and removes it on
     *  completion/error. No extra CSS class juggling required.
     *
     *  Layout: two-cell flex row, fixed-width label + mono readout pairs,
     *  separated by a structural gap. Reads like instrument panel readouts.
     * ════════════════════════════════════════════════════════════════════ */
    #eta-row {
      display: none;
      align-items: center;
      gap: 24px;
    }

    /* Shown only during active generation */
    #main-panel[data-generating] #eta-row {
      display: flex;
    }

    .eta-cell {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .eta-cell-label {
      font-family: var(--ws-font-ui);
      font-size: var(--ws-type-small);
      font-weight: var(--ws-weight-label);
      letter-spacing: var(--ws-tracking-ui);
      color: var(--ws-fg-muted);
      opacity: 0.6;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .eta-cell-value {
      font-family: var(--ws-font-mono);
      font-size: var(--ws-type-label);
      color: var(--ws-fg);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    /* Separator between ELAPSED and ETA — a vertical 1px rule */
    .eta-separator {
      width: 1px;
      height: 14px;
      background: var(--ws-border);
      align-self: center;
    }

    /* ── STATUS TEXT ─────────────────────────────────────────────────── */
    #status-text {
      font-family: var(--ws-font-mono);
      font-size: var(--ws-type-small);
      color: var(--ws-fg-muted);
      min-height: 1.2em;
      word-break: break-word;
    }

    /* ── LOG PANEL ───────────────────────────────────────────────────── */
    #log-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #log-bar-label {
      font-family: var(--ws-font-ui);
      font-size: var(--ws-type-small);
      font-weight: var(--ws-weight-label);
      letter-spacing: var(--ws-tracking-ui);
      color: var(--ws-fg-muted);
      user-select: none;
      opacity: 0.6;
    }

    #log-toggle {
      font-family: var(--ws-font-mono);
      font-size: 10px;
      background: transparent;
      border: 1px solid var(--ws-border);
      border-radius: 0;
      color: var(--ws-fg-muted);
      cursor: pointer;
      padding: 2px 8px;
      letter-spacing: 0.06em;
      transition: border-color 150ms ease, color 150ms ease;
    }

    #log-toggle:hover {
      border-color: var(--ws-border-active);
      color: var(--ws-amber);
    }

    #log-panel {
      background: color-mix(in oklch, var(--ws-bg) 60%, black);
      border: 1px solid var(--ws-border);
      height: 164px;
      overflow: hidden;
      display: none;
    }

    #log-output {
      height: 100%;
      overflow-y: auto;
      padding: 6px 10px;
      font-family: var(--ws-font-mono);
      font-size: 11px;
      line-height: 1.65;
    }

    .log-entry       { display: flex; gap: 9px; }
    .log-ts          { color: var(--ws-fg-muted); opacity: 0.35; flex-shrink: 0; }
    .log-icon        { flex-shrink: 0; width: 1ch; }
    .log-msg         { color: var(--ws-fg-muted); word-break: break-all; }

    .log-entry[data-type="start"]    .log-icon,
    .log-entry[data-type="start"]    .log-msg    { color: var(--ws-amber); }
    .log-entry[data-type="complete"] .log-icon,
    .log-entry[data-type="complete"] .log-msg    { color: var(--ws-neon); }
    .log-entry[data-type="node"]     .log-icon   { color: var(--ws-neon); }
    .log-entry[data-type="node"]     .log-msg    { color: var(--ws-fg); }
    .log-entry[data-type="step"]     .log-icon,
    .log-entry[data-type="step"]     .log-msg    { color: var(--ws-amber); opacity: 0.75; }
    .log-entry[data-type="error"]    .log-icon,
    .log-entry[data-type="error"]    .log-msg    { color: var(--ws-state-error); }

    /* ── VIDEO PLAYER ────────────────────────────────────────────────── */
    #video-player {
      width: 100%;
      max-height: 400px;
      background: black;
      display: none;
    }

    /* ── OUTPUT SETTINGS CARD ────────────────────────────────────────── */
    #output-card {
      border: 1px solid var(--ws-border);
      background: var(--ws-bg-elevated);
    }

    #output-card-header {
      padding: 5px 12px;
      border-bottom: 1px solid var(--ws-border);
      font-family: var(--ws-font-ui);
      font-size: var(--ws-type-label);
      font-weight: var(--ws-weight-label);
      letter-spacing: var(--ws-tracking-ui);
      color: var(--ws-fg-muted);
      text-transform: uppercase;
      user-select: none;
    }

    #output-card-body {
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .output-row {
      display: grid;
      grid-template-columns: 150px 1fr;
      align-items: center;
    }

    .output-label {
      font-family: var(--ws-font-ui);
      font-size: var(--ws-type-small);
      font-weight: var(--ws-weight-label);
      letter-spacing: var(--ws-tracking-ui);
      color: var(--ws-fg-muted);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .output-select {
      font-family: var(--ws-font-mono);
      font-size: var(--ws-type-small);
      background: var(--ws-bg);
      color: var(--ws-fg);
      border: 1px solid var(--ws-border);
      border-radius: 0;
      padding: 4px 8px;
      outline: none;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      transition: border-color 150ms ease;
    }

    .output-select:hover,
    .output-select:focus {
      border-color: var(--ws-border-active);
      outline: none;
    }

  </style>
</head>
<body>

  <!-- WAN BOOTH nameplate -->
  <header id="nameplate">
    <h1>WAN BOOTH</h1>
  </header>

  <!-- Main panel — data-generating attribute is set/removed by renderer.js during generation -->
  <main id="main-panel">

    <!-- Image drop zone -->
    <div id="drop-zone">
      <span id="drop-label">DROP IMAGE</span>
    </div>

    <!-- Prompt input -->
    <textarea id="prompt-input" placeholder="Describe motion, camera, scene..."></textarea>

    <!-- LoRA Stage Cards
         Two collapsible equipment panels. Stage 1 and Stage 2 are joined
         by a 4px seam inside .lora-section — they read as one instrument block.

         Collapse mechanism: hidden checkbox + label targeting.
         Default state: both stages OPEN (checkboxes checked).

         Subgrid: .lora-section provides grid-template-columns: 180px 1fr 52px.
         .lora-stage-body uses display:subgrid to inherit those column widths.
         .lora-row uses display:contents to place its 3 children directly into
         the subgrid. Result: label column and value column align perfectly
         across both stages when both are open simultaneously. -->
    <div class="lora-section">

      <!-- ── STAGE 1 — HIGH DETAIL PASS ──────────────────────────────── -->
      <div class="lora-stage" id="lora-stage-1">

        <!-- Hidden mechanical latch — checked = panel open (default) -->
        <input type="checkbox" class="lora-toggle" id="stage-1-toggle" checked>

        <!-- Pull-handle: clicking this label toggles the checkbox -->
        <label for="stage-1-toggle" class="lora-stage-header">
          <span class="lora-stage-header-title">STAGE 1 — HIGH DETAIL PASS</span>
          <span class="lora-stage-header-caret" aria-hidden="true"></span>
        </label>

        <!-- Drawer — collapses/expands via max-height transition -->
        <div class="lora-stage-body">

          <!-- DR34ML4Y STRENGTH -->
          <div class="lora-row">
            <span class="lora-row-label">DR34ML4Y STR</span>
            <div class="lora-row-track">
              <input type="range" class="lora-slider" id="s1-dr34mlay-str"
                     min="0" max="1" step="0.01" value="0.80"
                     aria-label="Stage 1 DR34ML4Y strength">
            </div>
            <span class="lora-row-value" id="s1-dr34mlay-str-val">0.80</span>
          </div>

          <!-- K3NK STRENGTH -->
          <div class="lora-row">
            <span class="lora-row-label">K3NK STR</span>
            <div class="lora-row-track">
              <input type="range" class="lora-slider" id="s1-k3nk-str"
                     min="0" max="1" step="0.01" value="0.60"
                     aria-label="Stage 1 k3nk strength">
            </div>
            <span class="lora-row-value" id="s1-k3nk-str-val">0.60</span>
          </div>

          <!-- STEPS -->
          <div class="lora-row">
            <span class="lora-row-label">STEPS</span>
            <div class="lora-row-track">
              <input type="range" class="lora-slider" id="s1-steps"
                     min="1" max="60" step="1" value="20"
                     aria-label="Stage 1 steps">
            </div>
            <span class="lora-row-value" id="s1-steps-val">20</span>
          </div>

          <!-- CFG -->
          <div class="lora-row">
            <span class="lora-row-label">CFG</span>
            <div class="lora-row-track">
              <input type="range" class="lora-slider" id="s1-cfg"
                     min="1" max="15" step="0.1" value="3.5"
                     aria-label="Stage 1 CFG scale">
            </div>
            <span class="lora-row-value" id="s1-cfg-val">3.5</span>
          </div>

        </div><!-- /.lora-stage-body -->
      </div><!-- /#lora-stage-1 -->

      <!-- ── STAGE 2 — REFINEMENT PASS ───────────────────────────────── -->
      <div class="lora-stage" id="lora-stage-2">

        <input type="checkbox" class="lora-toggle" id="stage-2-toggle" checked>

        <label for="stage-2-toggle" class="lora-stage-header">
          <span class="lora-stage-header-title">STAGE 2 — REFINEMENT PASS</span>
          <span class="lora-stage-header-caret" aria-hidden="true"></span>
        </label>

        <div class="lora-stage-body">

          <!-- DR34ML4Y STRENGTH -->
          <div class="lora-row">
            <span class="lora-row-label">DR34ML4Y STR</span>
            <div class="lora-row-track">
              <input type="range" class="lora-slider" id="s2-dr34mlay-str"
                     min="0" max="1" step="0.01" value="0.80"
                     aria-label="Stage 2 DR34ML4Y strength">
            </div>
            <span class="lora-row-value" id="s2-dr34mlay-str-val">0.80</span>
          </div>

          <!-- K3NK STRENGTH -->
          <div class="lora-row">
            <span class="lora-row-label">K3NK STR</span>
            <div class="lora-row-track">
              <input type="range" class="lora-slider" id="s2-k3nk-str"
                     min="0" max="1" step="0.01" value="0.60"
                     aria-label="Stage 2 k3nk strength">
            </div>
            <span class="lora-row-value" id="s2-k3nk-str-val">0.60</span>
          </div>

          <!-- STEPS -->
          <div class="lora-row">
            <span class="lora-row-label">STEPS</span>
            <div class="lora-row-track">
              <input type="range" class="lora-slider" id="s2-steps"
                     min="1" max="60" step="1" value="31"
                     aria-label="Stage 2 steps">
            </div>
            <span class="lora-row-value" id="s2-steps-val">31</span>
          </div>

          <!-- CFG -->
          <div class="lora-row">
            <span class="lora-row-label">CFG</span>
            <div class="lora-row-track">
              <input type="range" class="lora-slider" id="s2-cfg"
                     min="1" max="15" step="0.1" value="6.0"
                     aria-label="Stage 2 CFG scale">
            </div>
            <span class="lora-row-value" id="s2-cfg-val">6.0</span>
          </div>

        </div><!-- /.lora-stage-body -->
      </div><!-- /#lora-stage-2 -->

    </div><!-- /.lora-section -->

    <!-- Seed row -->
    <div id="seed-row">
      <label id="seed-label">SEED</label>
      <button id="seed-toggle" aria-label="Toggle seed mode">RANDOM</button>
      <input type="number" id="seed-value" value="42" min="0" max="9999999999">
    </div>

    <!-- Output settings card — resolution, FPS, repeat runs -->
    <div id="output-card">
      <div id="output-card-header">OUTPUT SETTINGS</div>
      <div id="output-card-body">

        <div class="output-row">
          <label class="output-label" for="resolution-select">RESOLUTION</label>
          <select id="resolution-select" class="output-select" aria-label="Output resolution preset">
            <option value="832x480" selected>832×480  —  LANDSCAPE 480P</option>
            <option value="480x832">480×832  —  PORTRAIT 480P</option>
            <option value="624x624">624×624  —  SQUARE</option>
            <option value="1280x720">1280×720  —  LANDSCAPE 720P  (4× slower)</option>
            <option value="720x1280">720×1280  —  PORTRAIT 720P  (4× slower)</option>
          </select>
        </div>

        <div class="output-row">
          <label class="output-label" for="fps-select">FRAME RATE</label>
          <select id="fps-select" class="output-select" aria-label="Output frame rate">
            <option value="8">8 FPS  —  minimum</option>
            <option value="12">12 FPS  —  slow</option>
            <option value="16" selected>16 FPS  —  native (default)</option>
            <option value="24">24 FPS  —  smooth</option>
          </select>
        </div>

        <div class="output-row">
          <label class="output-label" for="runs-select">RUNS</label>
          <select id="runs-select" class="output-select" aria-label="Number of repeat runs">
            <option value="1" selected>1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </div>

      </div>
    </div>

    <!-- Generate button -->
    <button id="go-btn">GENERATE</button>

    <!-- Progress bar — 11px with shimmer overlay child -->
    <div id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
      <div id="progress-fill"></div>
      <div id="progress-shimmer" aria-hidden="true"></div>
    </div>

    <!-- ETA / Elapsed row — shown only when data-generating is set on #main-panel -->
    <div id="eta-row" aria-live="polite" aria-atomic="false">
      <div class="eta-cell">
        <span class="eta-cell-label">ELAPSED</span>
        <span class="eta-cell-value" id="elapsed-value">00:00:00</span>
      </div>
      <div class="eta-separator" aria-hidden="true"></div>
      <div class="eta-cell">
        <span class="eta-cell-label">ETA</span>
        <span class="eta-cell-value" id="eta-value">—</span>
      </div>
    </div>

    <!-- Status text -->
    <div id="status-text">READY</div>

    <!-- Execution log -->
    <div id="log-bar">
      <span id="log-bar-label">EXECUTION LOG</span>
      <button id="log-toggle">▾ SHOW</button>
    </div>
    <div id="log-panel">
      <div id="log-output"></div>
    </div>

    <!-- Video player (hidden until video is ready) -->
    <video id="video-player" controls autoplay loop style="display:none;"></video>

  </main>

  <!-- comfy.js MUST load BEFORE renderer.js -->
  <script src="comfy.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
